server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Required for React Router (SPA fallback):
    # unknown routes return index.html instead of a 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed assets (e.g. main.abc123.js)
    # These files are renamed on every build → safe to cache for a long time
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache on index.html to always serve the latest version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
