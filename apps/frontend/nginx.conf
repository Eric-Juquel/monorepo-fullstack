server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Nécessaire pour React Router :
    # toutes les routes inconnues renvoient index.html
    # sans ça, un refresh sur /users renverrait une 404 nginx
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressif pour les assets avec hash (ex: main.abc123.js)
    # Ces fichiers changent de nom à chaque build → safe à cacher longtemps
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache sur index.html pour toujours servir la dernière version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
