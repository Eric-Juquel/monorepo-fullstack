# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Local development with Docker
#
# Useful commands:
#   docker compose up          → start all services
#   docker compose up frontend → start frontend only
#   docker compose down        → stop and remove containers
#   docker compose logs -f     → stream logs
#   docker compose build       → rebuild images
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend    # build context (where the Dockerfile is)
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:3000  # internal Docker URL (not localhost!)
    ports:
      - "8080:80"   # localhost:8080 → container:80 (nginx)
    depends_on:
      - backend     # wait for backend to start
    networks:
      - app-network

  # ── NestJS Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"   # localhost:3000 → container:3000
    environment:
      NODE_ENV: development
      # DATABASE_URL: postgres://user:password@db:5432/mydb  ← uncomment later
    networks:
      - app-network
    # depends_on:
    #   - db          ← uncomment when a database is added

  # ── Database (future) ────────────────────────────────────────────────────────
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: password
  #     POSTGRES_DB: mydb
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - app-network

# ── Shared network ────────────────────────────────────────────────────────────
# Services communicate by name (e.g. "backend", "db")
# without exposing ports to the host
networks:
  app-network:
    driver: bridge

# ── Persistent volumes ────────────────────────────────────────────────────────
# volumes:
#   postgres-data:   ← uncomment when database is added
