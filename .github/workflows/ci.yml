name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   push → main      : after develop is merged to main (final gate before prod)
#   push → develop   : after a feat/* fix/* chore/* branch is merged
#   PR   → develop   : validate a feature branch before merging into develop
#   PR   → main      : validate develop before going to production
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Opt into Node.js 24 for GitHub Actions runners (checkout, setup-node...)
# Node.js 20 is deprecated since September 2025, Node.js 24 required from June 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend CI
  # ─────────────────────────────────────────────────────────────────────────────
  ci-frontend:
    name: CI Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter frontend typecheck

      - name: Lint
        run: pnpm --filter frontend lint

      - name: Tests
        run: pnpm --filter frontend test:run

      - name: Build
        run: pnpm --filter frontend build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'http://localhost:3001' }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Security — vulnerability scanning with Trivy (Aqua Security)
  #
  # Two complementary scans:
  #   1. Filesystem scan → CVEs in npm dependencies (package.json / lockfile)
  #   2. Image scan      → CVEs in the Docker image (OS packages, nginx, openssl…)
  #
  # The job fails if CRITICAL or HIGH fixable vulnerabilities are found.
  # Run `apk upgrade --no-cache` in the Dockerfile runner stage to fix OS CVEs.
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Scan 1: npm dependencies
      - name: Scan npm dependencies (filesystem)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ./apps/frontend
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true   # skip CVEs with no available fix

      # Scan 2: Docker image
      # Builds the image then scans OS-level packages (apk) and binaries
      - name: Build Docker image for scanning
        run: docker build -t frontend:${{ github.sha }} ./apps/frontend

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: frontend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true   # skip CVEs with no available fix

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend CI — stub, to be completed when NestJS is added
  # ─────────────────────────────────────────────────────────────────────────────
  ci-backend:
    name: CI Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: uncomment when NestJS is added
      # - name: Type check
      #   run: pnpm --filter backend tsc -b --noEmit
      # - name: Lint
      #   run: pnpm --filter backend lint
      # - name: Tests
      #   run: pnpm --filter backend test:run
      # - name: Build
      #   run: pnpm --filter backend build

      - name: Stub (backend not yet created)
        run: echo "Backend CI will be enabled when NestJS is added"
