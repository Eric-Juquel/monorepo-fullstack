name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Déclencheurs :
#   push → main      : après merge de develop (dernier garde-fou avant prod)
#   push → develop   : après merge d'une branche feat/* fix/* chore/*
#   PR   → develop   : validation d'une feature avant merge dans develop
#   PR   → main      : validation de develop avant mise en production
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Opter dans Node.js 24 pour les actions GitHub (checkout, setup-node...)
# Node.js 20 est déprécié depuis septembre 2025, Node.js 24 obligatoire en juin 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # CI Frontend — déclenché si apps/frontend/** ou la config workspace change
  # ───────────────────────────────────────────────────────────────────────────
  ci-frontend:
    name: CI Frontend
    runs-on: ubuntu-latest

    # Path filter : ce job est ignoré si seul le backend a changé
    # Note : sur une PR, GitHub vérifie les fichiers modifiés
    # Sur un push direct sur main, tous les jobs tournent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter frontend typecheck

      - name: Lint
        run: pnpm --filter frontend lint

      - name: Tests
        run: pnpm --filter frontend test:run

      - name: Build
        run: pnpm --filter frontend build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'http://localhost:3001' }}

  # ───────────────────────────────────────────────────────────────────────────
  # Security — Scan de vulnérabilités avec Trivy (Aqua Security)
  #
  # Deux scans complémentaires :
  #   1. Filesystem scan → vulnérabilités dans les dépendances npm (package.json)
  #   2. Image scan      → vulnérabilités dans l'image Docker (OS + packages système)
  #
  # Trivy est le scanner open source le plus utilisé en CI/CD.
  # Il détecte les CVE (Common Vulnerabilities and Exposures) connues.
  # Le job échoue si des vulnérabilités CRITICAL ou HIGH sont trouvées.
  # ───────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Scan 1 : Dépendances npm ──────────────────────────────────────────
      # Scanne les fichiers package.json / pnpm-lock.yaml du frontend
      # pour détecter des packages npm avec des CVE connues
      - name: Scan npm dependencies (filesystem)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ./apps/frontend
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true   # ignore les CVE sans correctif disponible

      # ── Scan 2 : Image Docker ─────────────────────────────────────────────
      # Build l'image Docker du frontend, puis la scanne pour détecter :
      #   - des vulnérabilités dans les packages OS (apk/alpine)
      #   - des vulnérabilités dans les binaires embarqués (nginx, openssl, etc.)
      - name: Build Docker image for scanning
        run: docker build -t frontend:${{ github.sha }} ./apps/frontend

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: frontend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true   # ignore les CVE sans correctif disponible

  # ───────────────────────────────────────────────────────────────────────────
  # CI Backend — stub, à compléter quand NestJS sera créé
  # ───────────────────────────────────────────────────────────────────────────
  ci-backend:
    name: CI Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: décommenter quand NestJS sera créé
      # - name: Type check
      #   run: pnpm --filter backend tsc -b --noEmit
      # - name: Lint
      #   run: pnpm --filter backend lint
      # - name: Tests
      #   run: pnpm --filter backend test:run
      # - name: Build
      #   run: pnpm --filter backend build

      - name: Stub (backend pas encore créé)
        run: echo "Backend CI sera activé quand NestJS sera ajouté"
