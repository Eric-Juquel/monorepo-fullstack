name: Deploy

# ─────────────────────────────────────────────────────────────────────────────
# Le CD (Continuous Deployment) ne se déclenche QUE sur push vers main
# (pas sur les PRs — on ne déploie pas du code non mergé)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]

# Opter dans Node.js 24 pour les actions GitHub (checkout, setup-node...)
# Node.js 20 est déprécié depuis septembre 2025, Node.js 24 obligatoire en juin 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Déploiement Frontend sur Vercel
  # Prérequis GitHub Secrets à configurer dans :
  # Settings > Secrets and variables > Actions
  #   - VERCEL_TOKEN      → token Vercel (vercel.com > Account Settings > Tokens)
  #   - VERCEL_ORG_ID     → ton org ID Vercel (vercel.com > Settings)
  #   - VERCEL_PROJECT_ID → l'ID du projet Vercel (dossier .vercel/project.json après vercel link)
  #   - VITE_API_BASE_URL → URL de ton API en production
  # ───────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ───────────────────────────────────────────────────────────────────────────
  # Déploiement Backend — stub pour NestJS (Railway / Fly.io / autre)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → (à définir)
    runs-on: ubuntu-latest

    steps:
      - name: Stub (backend pas encore créé)
        run: echo "Backend CD sera configuré quand NestJS sera ajouté"
