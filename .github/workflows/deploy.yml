name: Deploy

# ─────────────────────────────────────────────────────────────────────────────
# CD triggers on push to main only
# PRs never trigger a deployment — we only deploy merged, validated code
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]

# Opt into Node.js 24 for GitHub Actions runners (checkout, setup-node...)
# Node.js 20 is deprecated since September 2025, Node.js 24 required from June 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy frontend to Vercel
  #
  # Required GitHub Secrets (Settings > Secrets and variables > Actions):
  #   VERCEL_TOKEN      → Vercel token (vercel.com > Account Settings > Tokens)
  #   VERCEL_ORG_ID     → org ID from .vercel/project.json after `vercel link`
  #   VERCEL_PROJECT_ID → project ID from .vercel/project.json after `vercel link`
  #   VITE_API_BASE_URL → production API URL
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend deployment — stub for NestJS (Railway / Fly.io / TBD)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → (TBD)
    runs-on: ubuntu-latest

    steps:
      - name: Stub (backend not yet created)
        run: echo "Backend CD will be configured when NestJS is added"
